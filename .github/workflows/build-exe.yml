name: Windows еҸҜжү§иЎҢж–Үд»¶жү“еҢ…

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: жЈҖеҮәд»Јз Ғ
        uses: actions/checkout@v4

      - name: и§ЈжһҗеҸ‘еёғзүҲжң¬
        id: release_version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $tag = "${{ github.ref_name }}"
          } else {
            $content = Get-Content -LiteralPath "todo_app/constants.py" -Raw
            if ($content -notmatch 'APP_VERSION\s*=\s*"(?<version>\d+\.\d+\.\d+)"') {
              throw "ж— жі•д»Һ todo_app/constants.py и§Јжһҗ APP_VERSION"
            }
            $tag = "v$($Matches.version)"
          }
          "release_tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: и®ҫзҪ® Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: й…ҚзҪ® pip зј“еӯҳзӣ®еҪ•
        run: |
          $cacheDir = Join-Path $env:RUNNER_TEMP "pip-cache"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          "PIP_CACHE_DIR=$cacheDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: зј“еӯҳ pip
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: е®үиЈ…дҫқиө–
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: жһ„е»әеҸҜжү§иЎҢж–Үд»¶
        run: |
          pyinstaller main.py `
            --name TODOList `
            --noconsole `
            --clean `
            --onefile `
            --add-data "assets;assets" `
            --hidden-import PySide6.QtSvg `
            --hidden-import PySide6.QtMultimedia

      - name: дёҠдј жһ„е»әдә§зү©
        uses: actions/upload-artifact@v4
        with:
          name: TODOList-windows
          path: dist/TODOList.exe
          if-no-files-found: error

      - name: еҗҢжӯҘеҸ‘еёғж Үзӯҫ
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f $env:RELEASE_TAG $env:GITHUB_SHA
          git push origin "refs/tags/$env:RELEASE_TAG" --force

      - name: еҲӣе»әжҲ–жӣҙж–°еҸ‘еёғ
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: dist/TODOList.exe
          overwrite_files: true
