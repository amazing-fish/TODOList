name: Windows 可执行文件打包

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: build-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 配置 pip 缓存目录
        run: |
          $cacheDir = Join-Path $env:RUNNER_TEMP "pip-cache"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          "PIP_CACHE_DIR=$cacheDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: 缓存 pip
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6

      - name: 构建可执行文件
        run: |
          pyinstaller main.py `
            --name TODOList `
            --noconsole `
            --clean `
            --onefile `
            --add-data "assets;assets" `
            --hidden-import PySide6.QtSvg `
            --hidden-import PySide6.QtMultimedia

      - name: 生成构建产物名称
        id: artifact
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $source = "manual"
          } elseif ("${{ github.ref }}" -like "refs/tags/v*") {
            $source = "${{ github.ref_name }}"
          } else {
            $source = "main"
          }
          "name=TODOList-$source-$shortSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: dist/TODOList.exe
          if-no-files-found: error
          retention-days: 7

      - name: 更新主分支预发布标签
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f pre-main $env:GITHUB_SHA
          git push origin refs/tags/pre-main --force

      - name: 创建或更新主分支预发布
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-main
          target_commitish: ${{ github.sha }}
          name: TODOList Main Preview
          prerelease: true
          make_latest: false
          files: dist/TODOList.exe
          overwrite_files: true

      - name: 创建或更新正式发布
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: dist/TODOList.exe
          overwrite_files: true
